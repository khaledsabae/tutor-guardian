name: almorabbi
description: "المربي الذكي — مساعد تربوي إسلامي آمن للأهل (Flutter / Android-first)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP + SSE streaming
  http: ^1.2.2

  # IDs + secure storage
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.2

  # Markdown rendering of assistant replies
  flutter_markdown: ^0.7.3

  # Arabic-friendly fonts
  google_fonts: ^6.2.1

  # Offline detection
  connectivity_plus: ^6.0.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
