name: almorabbi
description: "المربي الذكي — مساعد تربوي إسلامي آمن للأهل (Flutter / Android-first)."
publish_to: 'none'
version: 1.0.13+24

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP + SSE streaming
  http: ^1.2.2

  # IDs + secure storage
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.2

  # Markdown rendering of assistant replies
  flutter_markdown: ^0.7.3

  # Arabic-friendly fonts
  google_fonts: ^6.2.1

  # Offline detection
  connectivity_plus: ^6.0.5

  # Persistent on-device flags (onboarding completion, last active child).
  shared_preferences: ^2.3.2

  # Open the privacy policy from the Settings screen.
  url_launcher: ^6.3.0

  # Share + screenshot for share cards
  share_plus: ^10.0.0
  screenshot: ^3.0.0
  # File picker for backup import/export
  file_picker: ^8.0.0

  cupertino_icons: ^1.0.8
  just_audio: ^0.10.5
  record: ^5.1.2
  path_provider: ^2.1.4
  scrollable_positioned_list: ^0.3.8
  video_player: ^2.8.2

  # Visual redesign — code-only animation primitives (no asset files).
  flutter_animate: ^4.5.2
  confetti: ^0.8.0

  # Local push notifications for daily adhkar
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Firebase
  flame: ^1.16.0
  firebase_core: ^3.13.0
  firebase_crashlytics: ^4.3.0
  firebase_analytics: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/

# Reuse the existing PWA shield icon — keeps mobile visually consistent
# with the web client and saves us from designing a new asset. Source
# files live at ../frontend/icons/icon-{192,512}.png and were designed
# to match the brand colour #01696F (see frontend/manifest.json).
flutter_launcher_icons:
  image_path: "../frontend/icons/icon-512.png"
  adaptive_icon_background: "#01696F"
  adaptive_icon_foreground: "../frontend/icons/icon-512.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 23

flutter_native_splash:
  color: "#01696F"
  image: "../frontend/icons/icon-512.png"
  android_12:
    color: "#01696F"
    image: "../frontend/icons/icon-512.png"
  ios: false  # iOS in Phase 7

dependency_overrides:
  record_linux: ^1.1.0
