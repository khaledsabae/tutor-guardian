name: almorabbi
description: "المربي الذكي — مساعد تربوي إسلامي آمن للأهل (Flutter / Android-first)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP + SSE streaming
  http: ^1.2.2

  # IDs + secure storage
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.2

  # Markdown rendering of assistant replies
  flutter_markdown: ^0.7.3

  # Arabic-friendly fonts
  google_fonts: ^6.2.1

  # Offline detection
  connectivity_plus: ^6.0.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

# Reuse the existing PWA shield icon — keeps mobile visually consistent
# with the web client and saves us from designing a new asset. Source
# files live at ../frontend/icons/icon-{192,512}.png and were designed
# to match the brand colour #01696F (see frontend/manifest.json).
flutter_launcher_icons:
  image_path: "../frontend/icons/icon-512.png"
  adaptive_icon_background: "#01696F"
  adaptive_icon_foreground: "../frontend/icons/icon-512.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 23

flutter_native_splash:
  color: "#01696F"
  image: "../frontend/icons/icon-512.png"
  android_12:
    color: "#01696F"
    image: "../frontend/icons/icon-512.png"
  ios: false  # iOS in Phase 7
