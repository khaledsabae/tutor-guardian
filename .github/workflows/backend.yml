name: Backend tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'knowledge_base/**'
      - 'ops/tools/**'
      - 'pytest.ini'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'knowledge_base/**'
      - 'ops/tools/**'
      - 'pytest.ini'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

# Cancel in-flight runs on the same ref (saves minutes on rapid pushes).
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Fast unit tests (no docker, no real LLM) ───────────────────────
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      # Force tests to skip the network-bound RAG smoke test.
      SKIP_API_SMOKE: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # Install the curriculum loader's test deps (the test fixture
          # imports knowledge_base modules; we don't need a full
          # install — just ensure PYTHONPATH is correct, which
          # pytest.ini already does via pythonpath = backend).
        env:
          PYTHONDONTWRITEBYTECODE: '1'

      - name: Run pytest (excluding the network smoke test)
        run: |
          cd "$GITHUB_WORKSPACE"
          pytest --ignore=backend/tests/test_api_smoke.py -v

      - name: Run pytest with full suite (skip the smoke test via env)
        # Keep this as a second pass so a misconfigured `ignore` doesn't
        # silently mask regressions. The test internally checks
        # SKIP_API_SMOKE.
        run: |
          cd "$GITHUB_WORKSPACE"
          pytest -v
        env:
          SKIP_API_SMOKE: '1'

  # ── 2. Knowledge-base integrity (catches schema drift) ───────────────
  kb-integrity:
    name: KB integrity
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install KB integrity deps
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pyyaml

      - name: Run check_kb_integrity.py
        run: |
          cd "$GITHUB_WORKSPACE"
          python ops/tools/check_kb_integrity.py
