# Tutor Guardian — local-first stack (backend + Ollama).
# First run, pull the model once:
#   docker compose up -d ollama
#   docker compose exec ollama ollama pull qwen2.5:3b
#   docker compose up -d backend
#
# API:  http://localhost:8000  ·  test client: http://localhost:8000/ui/

services:
  ollama:
    image: ollama/ollama:latest
    container_name: tg_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tg_backend
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_PRIMARY_MODEL: ${OLLAMA_PRIMARY_MODEL:-gemma4:e4b}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-30}
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/ops                          # conversations.db + telemetry
      - chroma_index:/app/knowledge_base/chroma_db  # vector index (rebuilt from units)

volumes:
  ollama_models:
  app_data:
  chroma_index:
