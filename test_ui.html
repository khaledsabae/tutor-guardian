<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Tutor Guardian — تجربة</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background: #f8f9fa; }
  h1 { text-align: center; color: #1a2542; }
  .card { background: #fff; border-radius: 10px; padding: 1rem 1.25rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); margin-bottom: 1rem; }
  label { display: block; font-weight: 600; margin-bottom: .25rem; color: #333; }
  input, select, textarea { width: 100%; padding: .5rem .75rem; border: 1px solid #ccd; border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; }
  textarea { min-height: 100px; resize: vertical; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  button { width: 100%; padding: .75rem; border: none; border-radius: 8px; background: #1a2542; color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
  button:hover { background: #2a3a66; }
  pre { background: #0f1625; color: #d6f5e3; padding: 1rem; border-radius: 8px; overflow-x: auto; }
  .meta { display: flex; justify-content: space-between; font-size: .9rem; color: #666; margin-bottom: 1rem; }
  .badge { display: inline-block; padding: .2rem .6rem; border-radius: 999px; font-size: .85rem; font-weight: 600; }
  .badge.llm { background: #dbe9ff; color: #1a47b0; }
  .badge.retrieval { background: #fff3cd; color: #7a5d00; }
  .badge.emergency { background: #fce8e6; color: #a91e1e; }
  .badge.banned { background: #2b1010; color: #ff9e9e; }
</style>
</head>
<body>
<h1>🎓 Tutor Guardian — صفحة تجربة API</h1>

<div class="card">
  <div class="meta">
    <span>الخادم: <code>/api/assistant/query</code></span>
  </div>

  <label for="message_text">نص الرسالة</label>
  <textarea id="message_text" placeholder="مثال: كيف أحمي ابنتي من التنمر الإلكتروني وتعاني من القلق؟"></textarea>

  <div class="row">
    <div>
      <label for="age_group">الفئة العمرية</label>
      <select id="age_group">
        <option>3-5</option>
        <option selected>6-8</option>
        <option>9-11</option>
        <option>12-14</option>
        <option>15-18</option>
      </select>
    </div>
    <div>
      <label for="domain">المجال (اتركه فارغاً للكشف التلقائي)</label>
      <select id="domain">
        <option value=""></option>
        <option>fiqh</option>
        <option>tarbiyah</option>
        <option>medical</option>
        <option>cyber</option>
        <option>development</option>
      </select>
    </div>
  </div>

  <div class="row">
    <div>
      <label for="behavior_type">نوع السلوك</label>
      <input id="behavior_type" placeholder="مثال: تعليم_الصلاة">
    </div>
    <div>
      <label for="severity">الخطورة</label>
      <select id="severity">
        <option>خفيف</option>
        <option selected>متوسط</option>
        <option>عارض</option>
        <option>طارئ</option>
      </select>
    </div>
  </div>

  <button id="send">إرسال ✉️</button>
</div>

<div id="card">
  <div class="meta">
    <span id="status">جاهز</span>
    <span id="timer"></span>
  </div>
  <pre id="output">النتيجة ستظهر هنا...</pre>
</div>

<script>
  const el = id => document.getElementById(id);

  el('send').onclick = async () => {
    const payload = {
      message_text: el('message_text').value.trim(),
      age_group: el('age_group').value,
      behavior_type: el('behavior_type').value.trim(),
      severity: el('severity').value,
      domain: el('domain').value
    };

    if (!payload.message_text) {
      el('output').textContent = '⚠️ اكتب نص الرسالة اولاً';
      return;
    }

    el('status').textContent = 'جارٍ الإرسال...';
    el('output').textContent = 'جاري الاتصال بـ API...';
    const t0 = performance.now();

    try {
      const res = await fetch('/api/assistant/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const ms = ((performance.now() - t0)/1000).toFixed(2);
      el('timer').textContent = ms + ' ثانية';

      const data = await res.json();
      const mode = data.mode || 'llm';
      const domain = (data.domain || '—').toUpperCase();

      el('status').innerHTML = '<span class="badge ' + mode + '">' + mode + '</span>' +
        ' &nbsp; <span class="badge">' + domain + '</span>' +
        ' &nbsp; ' + (data.needs_human_review ? '🔴 مراجعة بشرية' : '🟢 تلقائي');

      const summary = [
        'mode: ' + data.mode,
        'domain: ' + (data.domain || '—'),
        'severity: ' + (data.severity || '—'),
        'escalation_target: ' + (data.escalation_target || '—'),
        '',
        (data.reply_text || '').slice(0, 1200)
      ].join('\n');

      el('output').textContent = summary;
      console.log('FULL:', JSON.stringify(data, null, 2));
    } catch (e) {
      el('status').textContent = '❌ خطأ';
      el('output').textContent = e.message || String(e);
    }
  };
</script>
</body>
</html>
