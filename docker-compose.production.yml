services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tg_backend
    restart: unless-stopped
    # No host-port binding needed — analytics_nginx reaches us via the shared network
    expose:
      - "8000"
    env_file: .env
    environment:
      PROJECT_ROOT: /app
    volumes:
      - tg_sessions:/app/ops          # sessions.db + feedback SQLite
      - tg_chroma:/app/knowledge_base/chroma_db
      # Lesson media (podcasts/videos, ~2GB) lives on the host — too big
      # to bake into the image. rsynced from the dev machine; the image's
      # COPY docs/ is shadowed by this read-only mount.
      - ./docs:/app/docs:ro
    networks:
      - internal
      - analytics_net               # shared with analytics_nginx for direct name-based proxy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      retries: 3
      start_period: 90s   # extra time for ONNX warm-up + ChromaDB index load

  # Optional Redis for distributed rate-limiting.
  # Enable with: docker compose --profile with-redis up -d
  redis:
    image: redis:7-alpine
    container_name: tg_redis
    restart: unless-stopped
    profiles: ["with-redis"]
    networks:
      - internal
    volumes:
      - tg_redis_data:/data

volumes:
  tg_sessions:
  tg_chroma:
  tg_redis_data:

networks:
  internal:
    driver: bridge
  analytics_net:
    external: true
    name: analytics-platform_production_network   # join analytics nginx network
